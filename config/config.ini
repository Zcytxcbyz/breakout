; ========================================
; Breakout Game Configuration
; ========================================

[Window]
; Window width (pixels)
WINDOW_W=960
; Window height (pixels)
WINDOW_H=540
; Frame limit (frames per second)
FRAME_LIMIT=60

[Physics]
; Pixels per meter (for physics calculations)
PPM=30.0
; Gravity strength (in meters per second squared)
GRAVITY=1.0

[Ball]
; Ball radius (in pixels)
BALL_RADIUS=12.0
; Ball density (for physics calculations)
BALL_DENSITY=1.0
; Ball restitution (bounciness)
BALL_RESTITUTION=1.0
; Initial speed of the ball (in pixels per second)
BALL_INIT_SPEED=200.0
; Maximum speed of the ball (in pixels per second)
MAX_BALL_SPEED=20.0
; Speed increase factor when the ball hits the paddle
SPEED_FACTOR=1.1

[Paddle]
; Paddle width (in pixels)
PADDLE_WIDTH=160.0
; Paddle height (in pixels)
PADDLE_HEIGHT=30.0
; Paddle movement speed (in pixels per second)
PADDLE_SPEED=800.0
; Paddle density (for physics calculations)
PADDLE_DENSITY=1.0
; Paddle restitution (bounciness)
PADDLE_RESTITUTION=1.0

[Walls]
; Thickness of the walls (in pixels)
WALL_THICKNESS=10.0

[Bricks]
; Number of rows of bricks
BRICK_ROWS=5
; Number of columns of bricks
BRICK_COLS=10
; Starting X position for the first brick (in pixels)
BRICK_START_X=80.0
; Starting Y position for the first brick (in pixels)
BRICK_START_Y=60.0
; Brick width (in pixels)
BRICK_WIDTH=70.0
; Brick height (in pixels)
BRICK_HEIGHT=25.0
; Spacing between bricks in the X direction (in pixels)
BRICK_SPACING_X=80.0
; Spacing between bricks in the Y direction (in pixels)
BRICK_SPACING_Y=35.0
; Probability of a brick spawning (0-100)
BRICK_SPAWN_PROB=70
; Brick density (for physics calculations)
MIN_HEALTH=1
; Maximum health of a brick (number of hits it can take before breaking)
MAX_HEALTH=3
; Score per brick (points awarded for breaking a brick)
SCORE_PER_BRICK=10

[Offsets]
; Vertical offset for the ball and paddle from the bottom of the window (in pixels)
BALL_Y_OFFSET=50.0
; Vertical offset for the paddle from the bottom of the window (in pixels)
PADDLE_Y_OFFSET=50.0
